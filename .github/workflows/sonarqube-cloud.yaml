name: SonarQube Cloud

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/skills/containerized-rust-ops/**'
      - '.github/workflows/sonarqube-cloud.yaml'
      - 'sonar-project.properties'
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/skills/containerized-rust-ops/**'
      - '.github/workflows/sonarqube-cloud.yaml'
      - 'sonar-project.properties'

permissions:
  contents: read
  pull-requests: read

jobs:
  analyze:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Cache SonarQube packages
        uses: actions/cache@v5.0.4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          toolchain: 1.94.0
          components: clippy, llvm-tools-preview
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      - name: Install cargo-llvm-cov
        run: sh ./.github/skills/containerized-rust-ops/scripts/install-cargo-llvm-cov.sh
      - name: Generate Rust coverage report
        env:
          RUN_KIND_TESTS: "1"
          RUST_TEST_THREADS: "1"
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --all-targets --lcov --output-path target/llvm-cov/lcov.info
      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600
