name: SonarQube Cloud

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/skills/containerized-rust-ops/**'
      - '.github/workflows/sonarqube-cloud.yaml'
      - 'sonar-project.properties'
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/skills/containerized-rust-ops/**'
      - '.github/workflows/sonarqube-cloud.yaml'
      - 'sonar-project.properties'

permissions:
  contents: read
  pull-requests: read

jobs:
  analyze:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Cache SonarQube packages
        uses: actions/cache@v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: 1.94.0
          components: clippy, llvm-tools-preview
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      - name: Install cargo-llvm-cov
        run: sh ./.github/skills/containerized-rust-ops/scripts/install-cargo-llvm-cov.sh
      - name: Generate Rust coverage report
        env:
          RUN_KIND_TESTS: "1"
          RUST_TEST_THREADS: "1"
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --all-targets --lcov --output-path target/llvm-cov/lcov.info
      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600
