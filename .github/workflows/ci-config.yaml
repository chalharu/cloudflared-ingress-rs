name: Renovate config CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'renovate.json'
      - 'renovate.json5?'
      - '.github/renovate.json5?'
      - '.gitlab/renovate.json5?'
      - '.renovaterc'
      - '.renovaterc.json5?'
      - 'package.json'
      - '.github/workflows/ci-config.yaml'
  push:
    branches: [ "main" ]
    paths:
      - 'renovate.json'
      - 'renovate.json5?'
      - '.github/renovate.json5?'
      - '.gitlab/renovate.json5?'
      - '.renovaterc'
      - '.renovaterc.json5?'
      - 'package.json'
      - '.github/workflows/ci-config.yaml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate Renovate config
        run: npx --yes renovate-config-validator renovate.json
