name: Rust test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/rust-ci.yaml'
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/rust-ci.yaml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [ "1.94.0" ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - name: Run tests
        run: cargo test --all-targets
      - name: Check formatting
        if: matrix.toolchain == '1.94.0'
        run: cargo fmt --all --check
      - name: Run clippy
        if: matrix.toolchain == '1.94.0'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  kind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          toolchain: 1.94.0
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      - name: Run kind-backed controller tests
        env:
          RUN_KIND_TESTS: "1"
          RUST_TEST_THREADS: "1"
        run: cargo test --workspace --all-targets kind_ -- --nocapture
