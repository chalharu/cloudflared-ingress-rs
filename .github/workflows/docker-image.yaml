name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/docker-image.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/docker-image.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-platform:
    name: build-platform (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=long
            type=schedule,pattern={{date 'YYYYMMDD-hhmmss'}}
      - name: Build the Docker image
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          provenance: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
      - uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3
        name: Docker login
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
      - name: Export digest
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"
      - name: Upload digest
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: build-platform
    steps:
      - name: Fail if any native build failed
        if: needs.build-platform.result != 'success'
        run: exit 1
      - uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3
        name: Docker login
        if: needs.build-platform.result == 'success' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: needs.build-platform.result == 'success' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
      - name: Docker meta
        if: needs.build-platform.result == 'success' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=long
            type=schedule,pattern={{date 'YYYYMMDD-hhmmss'}}
      - name: Download digests
        if: needs.build-platform.result == 'success' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - name: Create manifest list and push
        if: needs.build-platform.result == 'success' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tag_args=()
          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            tag_args+=("-t" "${tag}")
          done <<< "${TAGS}"
          digest_refs=()
          for digest in *; do
            digest_refs+=("${IMAGE_NAME}@sha256:${digest}")
          done
          [ "${#digest_refs[@]}" -gt 0 ]
          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"
      - name: Inspect published image
        if: needs.build-platform.result == 'success' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first_tag="$(printf '%s\n' "${TAGS}" | head -n 1)"
          docker buildx imagetools inspect "${first_tag}"
      - name: Confirm native Docker builds completed
        if: needs.build-platform.result == 'success' && (github.event_name == 'pull_request' || github.ref != 'refs/heads/main')
        run: echo "Native amd64 and arm64 Docker builds completed."
