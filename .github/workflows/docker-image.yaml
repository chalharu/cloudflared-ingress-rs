name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/scripts/**'
      - '.github/workflows/docker-image.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/scripts/**'
      - '.github/workflows/docker-image.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  BUILD_ONLY_DOCKER_IMAGE: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v')) }}
  PUBLISH_DOCKER_IMAGE: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) || (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v')) }}

jobs:
  build-platform:
    name: build-platform (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=long,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Build the Docker image
        if: env.BUILD_ONLY_DOCKER_IMAGE == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          provenance: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        name: Docker login
        if: env.PUBLISH_DOCKER_IMAGE == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        if: env.PUBLISH_DOCKER_IMAGE == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
      - name: Export digest
        if: env.PUBLISH_DOCKER_IMAGE == 'true'
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"
      - name: Upload digest
        if: env.PUBLISH_DOCKER_IMAGE == 'true'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: build-platform
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Fail if any native build failed
        if: needs.build-platform.result != 'success'
        run: exit 1
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        name: Docker login
        if: needs.build-platform.result == 'success' && env.PUBLISH_DOCKER_IMAGE == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: needs.build-platform.result == 'success' && env.PUBLISH_DOCKER_IMAGE == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Docker meta
        if: needs.build-platform.result == 'success' && env.PUBLISH_DOCKER_IMAGE == 'true'
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=long,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Download digests
        if: needs.build-platform.result == 'success' && env.PUBLISH_DOCKER_IMAGE == 'true'
        uses: actions/download-artifact@v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - name: Create manifest list and push
        if: needs.build-platform.result == 'success' && env.PUBLISH_DOCKER_IMAGE == 'true'
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tag_args=()
          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            tag_args+=("-t" "${tag}")
          done <<< "${TAGS}"
          digest_refs=()
          for digest in *; do
            digest_refs+=("${IMAGE_NAME}@sha256:${digest}")
          done
          [ "${#digest_refs[@]}" -gt 0 ]
          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"
      - name: Inspect published image
        if: needs.build-platform.result == 'success' && env.PUBLISH_DOCKER_IMAGE == 'true'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first_tag="$(printf '%s\n' "${TAGS}" | head -n 1)"
          docker buildx imagetools inspect "${first_tag}"
      - name: Clean up older non-semver images
        if: needs.build-platform.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_OWNER_TYPE: ${{ github.event.repository.owner.type }}
          GHCR_PACKAGE_NAME: ${{ github.event.repository.name }}
          NON_SEMVER_RETENTION_COUNT: "10"
        run: node .github/scripts/cleanup-ghcr.mjs
      - name: Confirm native Docker builds completed
        if: needs.build-platform.result == 'success' && env.BUILD_ONLY_DOCKER_IMAGE == 'true'
        run: echo "Native amd64 and arm64 Docker builds completed."
