name: Helm chart CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'helm/**'
      - '.github/workflows/helm-chart.yaml'
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
    paths:
      - 'helm/**'
      - '.github/workflows/helm-chart.yaml'

permissions:
  contents: read

env:
  HELM_VERSION: v3.17.3
  KIND_VERSION: v0.31.0
  KUBECTL_VERSION: v1.35.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Lint chart
        run: helm lint ./helm --strict
      - name: Render chart
        run: helm template cloudflared-ingress ./helm --namespace cloudflared-ingress-system >/tmp/cloudflared-ingress-rendered.yaml
      - name: Determine expected default image tag
        id: expected-default-image
        run: |
          app_version="$(sed -n 's/^appVersion:[[:space:]]*//p' helm/Chart.yaml | tr -d '"')"
          if [[ "${app_version}" == *-dev* ]]; then
            expected_tag=latest
          else
            expected_tag="${app_version}"
          fi
          echo "tag=${expected_tag}" >> "${GITHUB_OUTPUT}"
      - name: Verify checked-out chart defaults to the expected image tag
        run: |
          grep -F "image: \"ghcr.io/chalharu/cloudflared-ingress-rs:${{ steps.expected-default-image.outputs.tag }}\"" /tmp/cloudflared-ingress-rendered.yaml
      - name: Verify explicit image tag override
        run: |
          helm template cloudflared-ingress ./helm \
            --namespace cloudflared-ingress-system \
            --set image.tag=1.2.3 >/tmp/cloudflared-ingress-rendered-override.yaml
          grep -F 'image: "ghcr.io/chalharu/cloudflared-ingress-rs:1.2.3"' /tmp/cloudflared-ingress-rendered-override.yaml
      - name: Verify numeric image tag override is preserved
        run: |
          helm template cloudflared-ingress ./helm \
            --namespace cloudflared-ingress-system \
            --set image.tag=0 >/tmp/cloudflared-ingress-rendered-major-tag.yaml
          grep -F 'image: "ghcr.io/chalharu/cloudflared-ingress-rs:0"' /tmp/cloudflared-ingress-rendered-major-tag.yaml
      - name: Verify release chart defaults to appVersion
        run: |
          release_chart_dir="$(mktemp -d)"
          trap 'rm -rf "${release_chart_dir}"' EXIT
          cp -R helm/. "${release_chart_dir}/"
          sed -i 's/^appVersion: ".*"/appVersion: "0.2.0"/' "${release_chart_dir}/Chart.yaml"
          helm template cloudflared-ingress "${release_chart_dir}" \
            --namespace cloudflared-ingress-system >/tmp/cloudflared-ingress-rendered-release.yaml
          grep -F 'image: "ghcr.io/chalharu/cloudflared-ingress-rs:0.2.0"' /tmp/cloudflared-ingress-rendered-release.yaml
      - name: Package chart
        run: |
          mkdir -p /tmp/helm-packages
          helm package ./helm --destination /tmp/helm-packages
      - name: Verify packaged chart metadata
        run: |
          chart_version="$(sed -n 's/^version:[[:space:]]*//p' helm/Chart.yaml)"
          package_path="/tmp/helm-packages/cloudflared-ingress-${chart_version}.tgz"
          [ -f "${package_path}" ]
          helm show chart "${package_path}" | grep -F "version: ${chart_version}"

  install-kind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Prime kind tool cache
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            x86_64) arch=amd64 ;;
            aarch64|arm64) arch=arm64 ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          cache_dir="${RUNNER_TOOL_CACHE}/kind/${KIND_VERSION}/${arch}"
          kind_dir="${cache_dir}/kind/bin"
          kubectl_dir="${cache_dir}/kubectl/bin"
          mkdir -p "${kind_dir}" "${kubectl_dir}"

          install_kind() {
            local binary_path="${kind_dir}/kind"
            local download_path="${kind_dir}/kind-linux-${arch}"
            local release_metadata
            local expected_checksum

            [ -x "${binary_path}" ] && return 0

            release_metadata="$(
              curl --fail --show-error --silent --location \
                --retry 3 --retry-all-errors \
                "https://api.github.com/repos/kubernetes-sigs/kind/releases/tags/${KIND_VERSION}"
            )"
            expected_checksum="$(
              printf '%s' "${release_metadata}" | node -p '
                const fs = require("fs");
                const assetName = process.argv[1];
                const release = JSON.parse(fs.readFileSync(0, "utf8"));
                const asset = (release.assets || []).find(({ name }) => name === assetName);
                if (!asset || !asset.digest) {
                  process.exit(1);
                }
                asset.digest.replace(/^sha256:/, "");
              ' "kind-linux-${arch}"
            )" || {
              echo "Failed to resolve checksum for kind ${KIND_VERSION} (${arch})" >&2
              exit 1
            }

            for attempt in 1 2 3; do
              rm -f "${download_path}"
              curl --fail --show-error --silent --location \
                --retry 3 --retry-all-errors \
                -o "${download_path}" \
                "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-${arch}"

              if printf '%s  %s\n' "${expected_checksum}" "$(basename "${download_path}")" | (cd "${kind_dir}" && sha256sum -c -); then
                mv "${download_path}" "${binary_path}"
                chmod +x "${binary_path}"
                return 0
              fi

              sleep $((attempt * 2))
            done

            echo "Failed to cache kind ${KIND_VERSION}" >&2
            exit 1
          }

          install_kubectl() {
            local binary_path="${kubectl_dir}/kubectl"
            local checksum_path="${kubectl_dir}/kubectl.sha256"

            [ -x "${binary_path}" ] && return 0

            for attempt in 1 2 3; do
              rm -f "${binary_path}" "${checksum_path}"
              curl --fail --show-error --silent --location \
                --retry 3 --retry-all-errors \
                -o "${binary_path}" \
                "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${arch}/kubectl"
              curl --fail --show-error --silent --location \
                --retry 3 --retry-all-errors \
                -o "${checksum_path}" \
                "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${arch}/kubectl.sha256"

              if printf '%s  kubectl\n' "$(cat "${checksum_path}")" | (cd "${kubectl_dir}" && sha256sum -c -); then
                chmod +x "${binary_path}"
                rm -f "${checksum_path}"
                return 0
              fi

              sleep $((attempt * 2))
            done

            echo "Failed to cache kubectl ${KUBECTL_VERSION}" >&2
            exit 1
          }

          install_kind
          install_kubectl
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: ${{ env.KIND_VERSION }}
          kubectl_version: ${{ env.KUBECTL_VERSION }}
      - name: Validate rendered manifests against the API server
        run: |
          kubectl create namespace cloudflared-ingress-system
          helm template cloudflared-ingress ./helm --namespace cloudflared-ingress-system >/tmp/cloudflared-ingress-rendered.yaml
          kubectl apply --dry-run=server -f /tmp/cloudflared-ingress-rendered.yaml
      - name: Install chart
        run: |
          helm install cloudflared-ingress ./helm \
            --namespace cloudflared-ingress-system \
            --create-namespace
      - name: Verify installed resources
        run: |
          kubectl get deployment -n cloudflared-ingress-system cloudflared-ingress-controller
          kubectl get serviceaccount -n cloudflared-ingress-system cloudflared-ingress
          kubectl get clusterrole cloudflared-ingress
          kubectl get clusterrolebinding cloudflared-ingress
          kubectl get ingressclass cloudflared
          kubectl get crd cloudflaredtunnels.chalharu.top

  release:
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs:
      - lint
      - install-kind
    permissions:
      contents: read
      packages: write
    env:
      OCI_REGISTRY: ghcr.io
      OCI_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts
      OCI_CHART: oci://ghcr.io/${{ github.repository_owner }}/charts/cloudflared-ingress
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Determine release version
        id: version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          chart_version="$(sed -n 's/^version:[[:space:]]*//p' helm/Chart.yaml)"
          app_version="$(sed -n 's/^appVersion:[[:space:]]*//p' helm/Chart.yaml | tr -d '"')"
          [ "${chart_version}" = "${version}" ]
          [ "${app_version}" = "${version}" ]
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login "${OCI_REGISTRY}" \
            --username "${GITHUB_REPOSITORY_OWNER}" \
            --password-stdin
      - name: Package chart
        run: |
          mkdir -p /tmp/helm-packages
          helm package ./helm --destination /tmp/helm-packages
      - name: Push chart to GHCR OCI
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          package_path="/tmp/helm-packages/cloudflared-ingress-${VERSION}.tgz"
          [ -f "${package_path}" ]
          helm push "${package_path}" "${OCI_REPOSITORY}"
      - name: Inspect published chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: helm show chart "${OCI_CHART}" --version "${VERSION}"
